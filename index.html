<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my date for our 3-month anniversary? 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Will you be my date for our 3-month anniversary? 💕</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://tenor.com/view/cute-staring-cat-big-eyes-gif-7956809724572065030.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="https://github.com/PieNora/3-month-anniversary/blob/main/music/%E0%B8%A3%E0%B8%B1%E0%B8%81%E0%B8%99%E0%B8%B2%E0%B8%99%E0%B9%86.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
